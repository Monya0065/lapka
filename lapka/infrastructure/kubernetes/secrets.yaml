apiVersion: v1
kind: Namespace
metadata:
  name: lapka
---
apiVersion: v1
kind: Secret
metadata:
  name: lapka-secrets
  namespace: lapka
type: Opaque
stringData:
  database_url: "postgresql+asyncpg://lapka:CHANGEME@pgbouncer:5432/lapka"
  jwt_secret: "CHANGE_ME_TO_RANDOM_64_CHAR_STRING"
  redis_password: ""
  stripe_secret_key: ""
  openai_api_key: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lapka-config
  namespace: lapka
data:
  redis_url: "redis://redis:6379/0"
  redis_cache_url: "redis://redis-cache:6379/0"
  llm_provider: "noop"
  app_public_url: "https://lapka.example.com"
  cors_origins: "https://lapka.example.com"
---
apiVersion: v1
kind: Secret
metadata:
  name: lapka-db-secret
  namespace: lapka
type: Opaque
stringData:
  postgres-password: "lapka"
  postgres_user_password: "lapka"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: lapka
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-replica-data
  namespace: lapka
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast