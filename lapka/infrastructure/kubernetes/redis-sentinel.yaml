apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: lapka
data:
  redis.conf: |
    maxmemory 2gb
    maxmemory-policy allkeys-lru
    tcp-keepalive 60
    timeout 0
    activerehashing yes
    lazyfree-lazy-eviction yes
    lazyfree-lazy-expire yes
    stop-writes-on-bgsave-error yes
    rdbcompression yes
    rdbchecksum yes
    save 900 1
    save 300 10
    save 60 10000

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-master
  namespace: lapka
spec:
  serviceName: redis-master
  replicas: 1
  selector:
    matchLabels:
      app: redis
      role: master
  template:
    metadata:
      labels:
        app: redis
        role: master
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - /usr/local/etc/redis/redis.conf
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "250m"
              memory: "2Gi"
            limits:
              cpu: "1000m"
              memory: "4Gi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config
              mountPath: /usr/local/etc/redis
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
        - name: redis-data
          persistentVolumeClaimClaimName: redis-data

---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: lapka
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis
    role: master

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-replica
  namespace: lapka
spec:
  serviceName: redis-replica
  replicas: 2
  selector:
    matchLabels:
      app: redis
      role: replica
  template:
    metadata:
      labels:
        app: redis
        role: replica
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --replicaof
            - redis-master
            - "6379"
            - --replica-read-only no
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "1Gi"
            limits:
              cpu: "500m"
              memory: "2Gi"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-data
          persistentVolumeClaimClaimName: redis-replica-data

---
apiVersion: v1
kind: Service
metadata:
  name: redis-replica
  namespace: lapka
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis
    role: replica

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: lapka
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
    - port: 26379
      targetPort: 26379
      name: sentinel
  selector:
    app: redis