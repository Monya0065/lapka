# CDN-like caching layer configuration for nginx
# For production, replace with CloudFlare / CloudFront / etc.

# Upstream origins
upstream api_backend {
    server api:8000;
    keepalive 32;
}

upstream frontend_backend {
    server frontend:3000;
    keepalive 16;
}

# CDN caching zones
proxy_cache_path /var/cache/nginx/cdn 
    levels=1:2 
    keys_zone=cdn_static:100m 
    max_size=10g 
    inactive=7d 
    use_temp_path=off;

proxy_cache_path /var/cache/nginx/api 
    levels=1:2 
    keys_zone=cdn_api:50m 
    max_size=1g 
    inactive=1h 
    use_temp_path=off;

# Static assets - long cache
server {
    listen 80;
    server_name cdn.lapka.example.com;

    # JS/CSS with content-hash for cache busting
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend_backend;
        
        proxy_cache cdn_static;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1h;
        proxy_cache_use_error503;
        
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Cache-Hit "$upstream_cache_status";
        
        expires 30d;
        add_header Last-Modified "";
    }
    
    # HTML - short cache
    location ~* \.html$ {
        proxy_pass http://frontend_backend;
        
        proxy_cache cdn_static;
        proxy_cache_valid 200 10m;
        proxy_cache_valid 404 1m;
        
        add_header Cache-Control "public, max-age=600, must-revalidate";
        
        expires 10m;
    }
}

# API responses - edge caching
server {
    listen 80;
    server_name api-cdn.lapka.example.com;

    location /api/v1/public/ {
        proxy_pass http://api_backend;
        
        proxy_cache cdn_api;
        proxy_cache_valid 200 5m;
        proxy_cache_valid 404 1m;
        proxy_cache_valid 500 30s;
        
        add_header Cache-Control "public, max-age=300";
        add_header X-Cache "$upstream_cache_status";
        
        expires 5m;
    }

    # Disable caching for authenticated endpoints
    location /api/ {
        proxy_pass http://api_backend;
        
        proxy_request_buffering off;
        proxy_buffering off;
        
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

# Image optimization proxy
server {
    listen 80;
    server_name img.lapka.example.com;

    location / {
        proxy_pass http://frontend_backend;
        
        # Auto WebP/AVIF
        proxy_accept_types $proxy_accept_types image/webp image/avif;
        
        proxy_cache cdn_static;
        proxy_cache_valid 200 30d;
        
        # Resize for thumbnails
        image_filter resize 800 -;
        image_filter_buffer 10M;
    }
}