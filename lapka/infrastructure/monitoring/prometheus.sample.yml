global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/lapka/prometheus-alerts.yml

scrape_configs:
  - job_name: lapka-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000
    # Optional when METRICS_TOKEN is configured on API.
    # authorization:
    #   type: Bearer
    #   credentials: "<METRICS_TOKEN>"
    # Or use explicit header:
    # http_headers:
    #   X-Metrics-Token:
    #     values: ["<METRICS_TOKEN>"]
