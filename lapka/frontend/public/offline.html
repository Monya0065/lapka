<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Лапка — офлайн</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(180deg, #f7fbff, #eaf2ff);
        color: #1b2f52;
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(560px, 100%);
        border: 1px solid #bfd3ed;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 18px 42px rgba(23, 51, 93, 0.12);
        padding: 24px;
      }
      h1 {
        margin: 0;
        font-size: 30px;
      }
      p {
        color: #47638f;
        line-height: 1.5;
      }
      a {
        display: inline-block;
        margin-top: 12px;
        padding: 10px 16px;
        border-radius: 12px;
        background: linear-gradient(135deg, #2ea4df, #40c392);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Офлайн-режим Лапки</h1>
        <p>Сеть временно недоступна. Вы можете продолжить работу с последними сохранёнными данными и черновиками.</p>
        <p>После восстановления соединения локальные изменения будут синхронизированы автоматически.</p>
        <a href="/login">Вернуться в приложение</a>
      </section>
    </main>
  </body>
</html>
