services:
  db:
    image: postgres:16
    container_name: lapka-db
    environment:
      POSTGRES_DB: lapka
      POSTGRES_USER: lapka
      POSTGRES_PASSWORD: lapka
    ports:
      - "5432:5432"
    volumes:
      - lapka-postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c work_mem=16MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lapka -d lapka"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: lapka-redis
    ports:
      - "6379:6379"
    volumes:
      - lapka-redis-data:/data
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-cache:
    image: redis:7-alpine
    container_name: lapka-redis-cache
    volumes:
      - lapka-redis-cache-data:/data
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lapka-celery-worker
    command: celery -A src.core.celery_app worker --loglevel=info --concurrency=2
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
    profiles:
      - worker

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lapka-celery-beat
    command: celery -A src.core.celery_app beat --loglevel=info
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
    profiles:
      - worker

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lapka-api
    environment:
      APP_NAME: Lapka API
      DATABASE_URL: postgresql+asyncpg://lapka:lapka@db:5432/lapka
      SYNC_DATABASE_URL: postgresql://lapka:lapka@db:5432/lapka
      JWT_SECRET: change_me_super_secret
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      PHARMACY_PROVIDER: demo
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis-cache:6379/0
      APP_PUBLIC_URL: http://localhost:3000
      DATABASE_POOL_SIZE: 5
      DATABASE_MAX_OVERFLOW: 10
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: lapka-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: lapka-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    profiles:
      - production

volumes:
  lapka-postgres-data:
  lapka-redis-data:
  lapka-redis-cache-data: