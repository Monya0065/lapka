<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluid Calculator</title>
  <style>
    :root {
      --bg: #f1f8fb;
      --panel: #fff;
      --text: #142937;
      --muted: #577083;
      --brand: #1f6b99;
      --line: #cfe3ef;
    }
    body { margin: 0; font-family: "Manrope", "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    .box { width: min(760px, 92%); margin: 26px auto; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px; }
    h1 { margin-top: 0; }
    label { display: block; margin-top: 10px; font-weight: 700; }
    input, select, button { width: 100%; margin-top: 6px; padding: 10px; border-radius: 10px; border: 1px solid var(--line); font: inherit; }
    button { border: 0; background: var(--brand); color: #fff; font-weight: 700; cursor: pointer; }
    .result { margin-top: 14px; padding: 12px; border-radius: 10px; background: #f5fbff; border: 1px solid var(--line); }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <div class="box">
    <h1>Fluid Needs Estimator (Support Module)</h1>
    <p class="muted">Educational estimate for discussion with a veterinarian. Not a treatment instruction.</p>

    <label>Weight (kg)
      <input id="weight" type="number" min="0.5" step="0.1" value="8.0" />
    </label>

    <label>Hydration concern
      <select id="level">
        <option value="1">Low</option>
        <option value="1.15">Moderate</option>
        <option value="1.3">High</option>
      </select>
    </label>

    <button id="calcBtn">Estimate Daily Range</button>

    <div class="result" id="result">Enter inputs and calculate.</div>
  </div>

  <script>
    document.getElementById("calcBtn").addEventListener("click", () => {
      const weight = Number(document.getElementById("weight").value || 0);
      const factor = Number(document.getElementById("level").value || 1);
      const low = Math.round(weight * 40 * factor);
      const high = Math.round(weight * 60 * factor);

      const warning = factor >= 1.3
        ? "High concern noted. Prompt veterinary evaluation is recommended."
        : "Continue monitoring and consult your clinic for personalized guidance.";

      document.getElementById("result").innerHTML = `
        <strong>Estimated daily hydration range:</strong> ${low}-${high} ml/day<br />
        <strong>Safe action:</strong> ${warning}<br />
        <strong>Safety notice:</strong> This tool provides triage information only.
      `;
    });
  </script>
</body>
</html>
