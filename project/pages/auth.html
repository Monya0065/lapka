<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth | VetSafe Cloud</title>
  <style>
    :root {
      --bg: #f2f7ff;
      --panel: #ffffff;
      --text: #132338;
      --muted: #56708b;
      --brand: #1f5da6;
      --line: #d6e2f0;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Manrope", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #edf4ff 0%, #f8fbff 100%);
      color: var(--text);
      padding: 24px;
    }
    .auth {
      width: min(480px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 12px 30px rgba(19, 35, 56, 0.08);
    }
    h1 { margin-top: 0; }
    .muted { color: var(--muted); font-size: 14px; }
    label { display: block; font-weight: 700; margin-top: 12px; }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font: inherit;
      margin-top: 6px;
    }
    button {
      width: 100%;
      margin-top: 16px;
      border: 0;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      border-radius: 999px;
      padding: 12px;
      cursor: pointer;
    }
    .hidden { display: none; }
    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      background: #f1f7ff;
      border: 1px solid var(--line);
      font-size: 14px;
    }
    a { color: var(--brand); text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth">
    <h1>Sign in / Register</h1>
    <p class="muted">Email + password + 2FA. Roles: Owner, Doctor, Clinic Admin.</p>

    <form id="loginForm">
      <label>Email
        <input type="email" id="email" required placeholder="name@clinic.com" />
      </label>

      <label>Password
        <input type="password" id="password" required minlength="8" placeholder="Minimum 8 characters" />
      </label>

      <label>Role
        <select id="role" required>
          <option value="Owner">Owner</option>
          <option value="Doctor">Doctor</option>
          <option value="Clinic Admin">Clinic Admin</option>
        </select>
      </label>

      <button type="submit">Continue to 2FA</button>
    </form>

    <form id="twoFaForm" class="hidden">
      <label>2FA Code
        <input type="text" id="code" pattern="[0-9]{6}" maxlength="6" required placeholder="6-digit code" />
      </label>
      <button type="submit">Verify & Enter</button>
    </form>

    <div id="status" class="status" aria-live="polite">Waiting for credentials.</div>
    <p class="muted"><a href="/pages/index.html">Back to home</a></p>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");
    const twoFaForm = document.getElementById("twoFaForm");
    const status = document.getElementById("status");
    let selectedRole = "Owner";

    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      selectedRole = document.getElementById("role").value;
      loginForm.classList.add("hidden");
      twoFaForm.classList.remove("hidden");
      status.textContent = "2FA challenge sent. Enter the 6-digit code to continue.";
    });

    twoFaForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const code = document.getElementById("code").value.trim();
      if (!/^\d{6}$/.test(code)) {
        status.textContent = "Invalid code format. Use 6 digits.";
        return;
      }
      const route = selectedRole === "Owner"
        ? "/modules/owner-dashboard.html"
        : selectedRole === "Doctor"
          ? "/modules/doctor-dashboard.html"
          : "/modules/clinic-dashboard.html";
      status.innerHTML = `Authenticated as <strong>${selectedRole}</strong>. Demo route: <a href="${route}">${route}</a>`;
    });
  </script>
</body>
</html>
