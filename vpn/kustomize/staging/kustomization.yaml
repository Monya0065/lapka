apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

namespace: vpn-staging

namePrefix: staging-

replicas:
- name: vpn-api
  replicas: 2

patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/image
      value: ghcr.io/lapka/vpn-api:staging
  target:
    kind: Deployment
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: api-staging.lapka.ru
    - op: replace
      path: /spec/tls/0/hosts/0
      value: api-staging.lapka.ru
  target:
    kind: Ingress

configMapGenerator:
- name: vpn-config
  literals:
  - LOG_LEVEL=DEBUG

replicas:
- name: vpn-api
  count: 2

vars:
- name: API_URL
  objref:
    kind: ConfigMap
    name: vpn-config
    fieldpath: data.API_URL