global
    log stdout local0
    maxconn 4096
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  redispatch
    option  persist
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# Frontend for API
frontend vpn_api
    bind :8000
    bind :8443 ssl crt /etc/ssl/certs/lapka.pem
    mode http
    
    acl is_health path /health /health/ready /health/live
    acl is_metrics path /metrics
    
    use_backend health_backend if is_health
    use_backend metrics_backend if is_metrics
    
    default_backend api_backend
    
    # Rate limiting
    stick-table type ip size 1m expire 30s store http_req_rate(30s)
    http-request deny deny_status 429 if { sc_http_req_rate(stick_table) gt 100 }
    
    # Security headers
    http-response set-header Strict-Transport-Security max-age=31536000
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-Frame-Options DENY
    http-response set-header X-XSS-Protection 1; mode=block

# API Backend with multiple servers
backend api_backend
    mode http
    option httpchk GET /health/ready
    http-check expect status 200
    
    balance roundrobin
    
    server api-1 10.0.1.10:8000 check inter 5s rise 2 fall 3
    server api-2 10.0.1.11:8000 check inter 5s rise 2 fall 3
    server api-3 10.0.1.12:8000 check inter 5s rise 2 fall 3
    
    # Circuit breaker
    stick-table type ip size 10k expire 30s store conn_rate(30s)
    on-marked-down socket-timeout 30s
    
    # Compression
    compression algo gzip
    compression type text/html text/plain text/css application/json

# Health check backend
backend health_backend
    mode http
    server health-1 10.0.1.10:8000 check inter 3s fall 1 rise 1

# Metrics backend
backend metrics_backend
    mode http
    server metrics-1 10.0.1.10:8000 check inter 10s

# Stats frontend
frontend vpn_stats
    bind :8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 30s
    stats auth admin:changeme