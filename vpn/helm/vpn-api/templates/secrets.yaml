apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vpn-api.fullname" . }}-secrets
type: Opaque
stringData:
  database-url: {{ .Values.config.database-url }}
  redis-url: {{ .Values.config.redis-url }}
  jwt-secret: {{ .Values.config.jwt-secret }}
  yookassa-shop-id: {{ .Values.config.yookassa-shop-id }}
  yookassa-secret-key: {{ .Values.config.yookassa-secret-key }}
  telegram-bot-token: {{ .Values.config.telegram-bot-token }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vpn-api.fullname" . }}-config
data:
  API_URL: "https://api.lapka.ru"
  FRONTEND_URL: "https://lapka.ru"
  LOG_LEVEL: "INFO"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vpn-api.fullname" . }}
  labels:
    {{- include "vpn-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "vpn-api.selectorLabels" . | nindent 4 }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "vpn-api.fullname" . }}
  labels:
    {{- include "vpn-api.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "vpn-api.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- toYaml .Values.autoscaling | nindent 4 }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "vpn-api.fullname" . }}
  labels:
    {{- include "vpn-api.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vpn-api.selectorLabels" . | nindent 6 }}