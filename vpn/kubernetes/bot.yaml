# Telegram Bot Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-bot
  namespace: vpn-production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vpn-bot
  template:
    metadata:
      labels:
        app: vpn-bot
    spec:
      containers:
      - name: bot
        image: lapka/vpn-bot:v1.0.0
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: vpn-secrets
                key: TELEGRAM_BOT_TOKEN
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: vpn-secrets
              key: DATABASE_URL
        - name: API_URL
          value: "https://api.lapka.ru"
        envFrom:
        - configMapRef:
            name: vpn-config
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vpn-bot
  namespace: vpn-production
spec:
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: vpn-bot
---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-frontend
  namespace: vpn-production
spec:
  replicas: 10
  selector:
    matchLabels:
      app: vpn-frontend
  template:
    metadata:
      labels:
        app: vpn-frontend
    spec:
      containers:
      - name: frontend
        image: lapka/vpn-frontend:v1.0.0
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.lapka.ru"
        - name: NEXT_PUBLIC_TELEGRAM_BOT_USERNAME
          valueFrom:
            configMapRef:
              name: vpn-config
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vpn-frontend
  namespace: vpn-production
spec:
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  selector:
    app: vpn-frontend
---
# Frontend HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vpn-frontend-hpa
  namespace: vpn-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vpn-frontend
  minReplicas: 5
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70