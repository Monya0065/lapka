# WireGuard Kernel Module Installation and Optimization
# For production VPN nodes

---
# DaemonSet to install WireGuard kernel module
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wireguard-module-installer
  namespace: vpn-production
  labels:
    app: wireguard-module
    component: kernel
spec:
  selector:
    matchLabels:
      app: wireguard-module
  template:
    metadata:
      labels:
        app: wireguard-module
    spec:
      hostNetwork: true
      hostPID: true
      serviceAccountName: wireguard-installer
      containers:
      - name: installer
        image: alpine:3.19
        command:
        - sh
        - -c
        - |
          # Install WireGuard kernel module
          apk add wireguard-tools kmod wireguard-tools-wg-quick

          # Load kernel module
          modprobe wireguard || echo "Module already loaded"

          # Enable IP forwarding
          sysctl -w net.ipv4.ip_forward=1

          # Set persistent settings
          echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf

          # Keep container running
          tail -f /dev/null
        securityContext:
          privileged: true
          capabilities:
            add:
            - SYS_MODULE
        volumeMounts:
        - name: modules
          mountPath: /lib/modules
        - name: sysctl
          mountPath: /etc/sysctl.d
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
      volumes:
      - name: modules
        hostPath:
          path: /lib/modules
      - name: sysctl
        hostPath:
          path: /etc/sysctl.d
      tolerations:
      - effect: NoSchedule
        key: node-role
        operator: Equal
        value: vpn
---
#sysctl settings ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: wireguard-sysctl
  namespace: vpn-production
data:
  99-wireguard.conf: |
    # WireGuard optimization
    net.ipv4.ip_forward=1
    net.ipv4.conf.all.forwarding=1

    # Performance tuning
    net.core.rmem_max=16777216
    net.core.wmem_max=16777216
    net.ipv4.tcp_rmem=4096 87380 16777216
    net.ipv4.tcp_wmem=4096 87380 16777216

    # Connection tracking
    net.netfilter.nf_conntrack_max=262144
    net.netfilter.nf_conntrack_tcp_timeout_established=3600

    # WireGuard specific
    net.core.default_qdisc=fq
    net.ipv4.tcp_congestion_control=bbr
---
# WireGuard service with kernel acceleration
apiVersion: v1
kind: Service
metadata:
  name: wireguard-kernel
  namespace: vpn-production
spec:
  ports:
  - port: 51820
    targetPort: 51820
    protocol: UDP
    name: wireguard
  selector:
    app: vpn-node
---
# RBAC for WireGuard installer
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wireguard-installer
  namespace: vpn-production
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wireguard-installer
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["create", "get", "update"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wireguard-installer
subjects:
- kind: ServiceAccount
  name: wireguard-installer
  namespace: vpn-production
roleRef:
  kind: ClusterRole
  name: wireguard-installer
  apiGroup: rbac.authorization.k8s.io